name: Update B2B Dashboard

on:
  schedule:
    - cron: '0 12 * * *'   # 9am Colombia / 8am Chile todos los días
  workflow_dispatch:         # Botón manual en GitHub Actions

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install "pymongo[srv]" pyopenssl

      - name: Run updater
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: python update_dashboard.py

      - name: Commit and push to personal repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update $(date -u +%Y-%m-%d)"
          git push

      - name: Push updated index.html to koyweforest/b2b-dashboard
        run: |
          git clone https://x-access-token:${{ secrets.KOYWE_REPO_TOKEN }}@github.com/koyweforest/b2b-dashboard.git koywe-repo
          cp index.html koywe-repo/index.html
          cd koywe-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout gh-pages
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update $(date -u +%Y-%m-%d)"
          git push origin gh-pages
